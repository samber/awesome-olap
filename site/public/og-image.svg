<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f172a"/>
      <stop offset="100%" style="stop-color:#1e293b"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#6366f1"/>
      <stop offset="100%" style="stop-color:#8b5cf6"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- Accent bar -->
  <rect x="80" y="80" width="6" height="80" fill="url(#accent)" rx="3"/>

  <!-- Badge -->
  <rect x="80" y="180" width="160" height="32" rx="16" fill="#6366f1" opacity="0.2"/>
  <text x="160" y="201" font-family="system-ui, -apple-system, sans-serif" font-size="14" fill="#a5b4fc" text-anchor="middle" font-weight="500">Awesome List</text>

  <!-- Main title -->
  <text x="80" y="320" font-family="system-ui, -apple-system, sans-serif" font-size="80" fill="white" font-weight="700" letter-spacing="-2">Awesome OLAP</text>

  <!-- Subtitle -->
  <text x="80" y="390" font-family="system-ui, -apple-system, sans-serif" font-size="28" fill="#94a3b8" font-weight="400">Curated list of OLAP databases &amp; data engineering tools</text>

  <!-- Stats -->
  <text x="80" y="490" font-family="system-ui, -apple-system, sans-serif" font-size="22" fill="#64748b">100+ tools · 20+ categories · Open source</text>

  <!-- URL -->
  <text x="80" y="555" font-family="system-ui, -apple-system, sans-serif" font-size="18" fill="#475569">samber.github.io/awesome-olap</text>

  <!-- Decorative grid dots -->
  <g opacity="0.05">
    <circle cx="900" cy="150" r="3" fill="white"/>
    <circle cx="950" cy="150" r="3" fill="white"/>
    <circle cx="1000" cy="150" r="3" fill="white"/>
    <circle cx="1050" cy="150" r="3" fill="white"/>
    <circle cx="1100" cy="150" r="3" fill="white"/>
    <circle cx="900" cy="200" r="3" fill="white"/>
    <circle cx="950" cy="200" r="3" fill="white"/>
    <circle cx="1000" cy="200" r="3" fill="white"/>
    <circle cx="1050" cy="200" r="3" fill="white"/>
    <circle cx="1100" cy="200" r="3" fill="white"/>
    <circle cx="900" cy="250" r="3" fill="white"/>
    <circle cx="950" cy="250" r="3" fill="white"/>
    <circle cx="1000" cy="250" r="3" fill="white"/>
    <circle cx="1050" cy="250" r="3" fill="white"/>
    <circle cx="1100" cy="250" r="3" fill="white"/>
    <circle cx="900" cy="300" r="3" fill="white"/>
    <circle cx="950" cy="300" r="3" fill="white"/>
    <circle cx="1000" cy="300" r="3" fill="white"/>
    <circle cx="1050" cy="300" r="3" fill="white"/>
    <circle cx="1100" cy="300" r="3" fill="white"/>
    <circle cx="900" cy="350" r="3" fill="white"/>
    <circle cx="950" cy="350" r="3" fill="white"/>
    <circle cx="1000" cy="350" r="3" fill="white"/>
    <circle cx="1050" cy="350" r="3" fill="white"/>
    <circle cx="1100" cy="350" r="3" fill="white"/>
    <circle cx="900" cy="400" r="3" fill="white"/>
    <circle cx="950" cy="400" r="3" fill="white"/>
    <circle cx="1000" cy="400" r="3" fill="white"/>
    <circle cx="1050" cy="400" r="3" fill="white"/>
    <circle cx="1100" cy="400" r="3" fill="white"/>
